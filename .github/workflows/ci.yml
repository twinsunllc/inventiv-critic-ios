name: Nightly Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 1 AM Central (6 AM UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Xcode ${{ matrix.xcode }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode: "16.3"
            runner: macos-15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Critic \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            | tail -20
      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Critic \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            | tail -40

  # --- Nightly security jobs ---

  actions-security:
    name: GitHub Actions Security Check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Run GitHub Actions security audit
        uses: twinsunllc/github-actions-security-checker@3431967fb16dd3d0e96fcf823ba33609c2df31ee  # v1.4.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowlist: |
            twinsunllc
      - name: Upload audit report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        if: always()
        with:
          name: action-security-report
          path: action-security-report.md
          retention-days: 30
